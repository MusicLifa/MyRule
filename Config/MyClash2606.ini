custom_proxy_group=🐠 漏网之鱼`select`[]DIRECT`[]⛱️ 节点选择`[]REJECT

custom_proxy_group=⛱️ 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇹🇼 湾湾节点`[]🇯🇵 倭国节点`[]🇰🇷 棒子节点`[]🇸🇬 坡县节点`[]🇺🇸 美国节点`[]🧙‍ 手动切换`[]DIRECT

custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🧙‍ 手动切换`select`.*

